<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NM Bau - Felújítási árajánló</title>
  <link rel="icon" href="logo.png" type="image/png" />
  <style>
    body { margin: 0; font-family: 'Inter', -apple-system, sans-serif; background: #FAFAF7; color: #1C1917; }
    .demo { max-width: 720px; margin: 0 auto; padding: 72px 24px; text-align: center; }
    .demo img { width: 96px; height: auto; margin-bottom: 8px; }
    .demo h1 { color: #1C1917; font-size: 32px; margin: 8px 0; }
    .demo .accent { color: #B8860B; }
    .demo p { color: #57534E; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="demo">
    <img src="logo.png" alt="NM Bau" />
    <h1>NM Bau - <span class="accent">Felújítási árajánló</span></h1>
    <p>Árajánló asszisztens demó. A jobb alsó sarokban lévő gombbal indítható a beszélgetés.</p>
  </div>
  <script src="widget.js"></script>
</body>
</html>
